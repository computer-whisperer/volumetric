[alias]
# Build all model/operator wasm payloads that the app can load from `target/wasm32-unknown-unknown/{release|debug}/<crate>.wasm`.
build-wasm = "build --release --target wasm32-unknown-unknown -p simple_sphere_model -p simple_torus_model -p rounded_box_model -p gyroid_lattice_model -p mandelbulb_model -p density_gradient_model -p translate_operator -p boolean_operator -p rotation_operator -p scale_operator -p lua_script_operator -p f64_map_merge_operator -p stl_import_operator -p step_import_operator -p rectangular_prism_operator -p heightmap_extrude_operator -p image_model_operator -p extrude_operator -p revolve_operator -p fea_grid_mesh_operator -p fea_solve_operator -p fea_density_operator -p fea_inverse_operator -p mesh_to_model_operator -p mesh_height_operator -p lattice_operator -p mesh_clip_operator -p mesh_remaster_operator -p mesh_merge_operator -p mesh_transform_operator -p point_fill_operator -p strut_pattern_operator -p voronoi_skeleton_operator -p strut_model_operator -p brim_operator -p subspace_operator -p subspace_fit_operator -p model_bound_operator -p slice_operator -p span_operator -p intersect_operator -p island_removal_operator -p sdf_operator -p offset_operator -p sweep_operator -p cylinder_operator -p coil_operator -p coil_model_template -p fea_deform_operator -p trimesh_model_template -p brep_model_template -p trimesh_height_model_template -p gridfield_model_template -p lattice_model_template -p brim_model_template -p island_model_template -p sdf_model_template -p deform_model_template"
# build-wasm plus the wasm32-wasip1-threads fea-solver variants, packed into
# their baseline blobs (crates/wasm_dist). Use this when fea operators matter.
wasm-dist = "run -p wasm_dist --"
