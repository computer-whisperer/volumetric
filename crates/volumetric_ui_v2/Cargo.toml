[package]
name = "volumetric_ui_v2"
version = "0.1.0"
edition = "2024"
publish = false

[dependencies]
aetna-core = { version = "0.3.0", path = "../../../../aetna/aetna.main/crates/aetna-core" }
aetna-wgpu = { version = "0.3.0", path = "../../../../aetna/aetna.main/crates/aetna-wgpu" }
aetna-winit-wgpu = { version = "0.3.0", path = "../../../../aetna/aetna.main/crates/aetna-winit-wgpu" }
anyhow = "1"
glam = "0.32"
pollster = "0.4"
volumetric = { path = "../../" }
volumetric_assets = { path = "../volumetric_assets" }
volumetric_renderer = { path = "../volumetric_renderer" }
wgpu = "29"
winit = "0.30"

[[bin]]
name = "volumetric_ui_v2"
path = "src/main.rs"

[[bin]]
name = "dump_v2_shell"
path = "src/bin/dump_v2_shell.rs"
